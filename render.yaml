# Render Blueprint：https://render.com/docs/blueprint-spec
services:
  - type: web
    name: web3infoanddex-api
    runtime: go
    rootDir: backend
    buildCommand: go build -trimpath -ldflags="-s -w" -o server ./cmd/server
    startCommand: ./server
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: web3dex
      - key: CHAIN_ID
        value: "11155111"
      - key: NFT_AUCTION_ADDRESS
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: SYNC_INTERVAL_SEC
        value: "15"
      - key: CORS_ORIGINS
        sync: false
      - key: GIN_MODE
        value: release
