# Render Blueprint：https://render.com/docs/blueprint-spec
# 使用 Docker + Go 1.24，避免 Render 原生 Go 1.26 与 Atlas TLS 不兼容
services:
  - type: web
    name: web3infoanddex-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: web3dex
      - key: CHAIN_ID
        value: "11155111"
      - key: NFT_AUCTION_ADDRESS
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: SYNC_INTERVAL_SEC
        value: "15"
      - key: CORS_ORIGINS
        sync: false
      - key: GIN_MODE
        value: release
